base_model: Qwen/Qwen2.5-Math-7B
model_type: AutoModelForTokenClassification
num_labels: 1
tokenizer_type: AutoTokenizer

load_in_8bit: false
load_in_4bit: false
strict: false

datasets:
  - path: jacopo-minniti/MATH-PUM-qwen2.5-1.5B
    type: chat_template
    chat_template: tokenizer_default
    name: regression
    split: train

test_datasets:
  - path: jacopo-minniti/MATH-PUM-qwen2.5-1.5B
    type: chat_template
    chat_template: tokenizer_default
    name: regression
    split: test

output_dir: ./outputs/out
remove_unused_columns: false

sequence_len: 4096
sample_packing: true
eval_sample_packing: true
pad_to_sequence_len: true

wandb_project: pum
wandb_entity:
wandb_watch:
wandb_name: Math-Qwen2.5-1.5B-regression
wandb_log_model:


gradient_accumulation_steps: 2
micro_batch_size: 32
eval_batch_size: 32
num_epochs: 7
optimizer: adamw_torch_fused
lr_scheduler: cosine
learning_rate: 1e-4


gradient_checkpointing: true
gradient_checkpointing_kwargs:
  use_reentrant: false

train_on_inputs: false
group_by_length: false
bf16: auto
fp16:
tf32: true

early_stopping_patience:
resume_from_checkpoint:
local_rank:
logging_steps: 5
xformers_attention:

warmup_ratio: 0.3
save_strategy: "no"
evals_per_epoch: 1

debug:
deepspeed: deepspeed_configs/zero1.json
weight_decay: 0.00
fsdp:
fsdp_config:

hub_model_id: jacopo-minniti/Qwen2.5-Math-7B-PUM-regression
hub_strategy: "end"